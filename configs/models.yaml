# =====================================================================
# Model lineup — FROZEN for the inference phase.
# =====================================================================
# Four open-source models spanning architectures and a medical
# fine-tune. All free to run (Groq free tier + local Ollama).
#
# Last edited: 2026-05-19 (Mixtral -> Qwen3 swap)
# Status: locked v0.1
# =====================================================================

version: "0.1"
status: locked

models:

  llama-3.3-70b:
    provider: groq
    groq_model_id: "llama-3.3-70b-versatile"
    family: llama
    params_b: 70
    medical_tuned: false
    notes: Strongest open-weight general model in the lineup.

  llama-3.1-8b:
    provider: groq
    groq_model_id: "llama-3.1-8b-instant"
    family: llama
    params_b: 8
    medical_tuned: false
    ollama_fallback: "llama3.1:8b"
    notes: Small fast general model; also available locally via Ollama.

  qwen3-32b:
    provider: groq
    groq_model_id: "qwen/qwen3-32b"
    family: qwen
    params_b: 32
    medical_tuned: false
    notes: >
      Qwen3 32B (Alibaba). Replaced Mixtral 8x7B after Groq decommissioned
      it. Different model family for cross-architecture generalizability.

  medgemma-4b:
    provider: ollama
    ollama_model_id: "alibayram/medgemma:4b"
    family: gemma
    params_b: 4
    medical_tuned: true
    notes: >
      MedGemma 4B (Google, Gemma 3 base), instruction-tuned for medical
      text. Replaced BioMistral 7B, which returned empty/echoed output
      under our structured prompt (not instruction-tuned for QA format).

excluded_models:
  - name: medllama2
    reason: >
      Fine-tuned on MedQA, which is one of our strata. Test-set leakage
      would inflate common-stratum performance. Excluded.
  - name: natlas
    reason: >
      Nigerian federal government LLM. Out of scope for this paper's
      international benchmark framing; candidate for future work on
      African-context clinical LLMs.
