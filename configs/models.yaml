# =====================================================================
# Model lineup — FROZEN for the inference phase.
# =====================================================================
# Four open-source models spanning architectures and a medical
# fine-tune. All free to run (Groq free tier + local Ollama).
#
# Last edited: 2026-05-19 (Mixtral -> Qwen3 swap)
# Status: locked v0.1
# =====================================================================

version: "0.1"
status: locked

models:

  llama-3.1-8b:
    provider: ollama
    ollama_model_id: "llama3.1:8b"
    family: llama
    params_b: 8
    medical_tuned: false
    notes: General model (Meta). Runs locally via Ollama.

  qwen2.5-7b:
    provider: ollama
    ollama_model_id: "qwen2.5:7b"
    family: qwen
    params_b: 7
    medical_tuned: false
    notes: General model (Alibaba). Different family for architecture diversity.

  gemma2-9b:
    provider: ollama
    ollama_model_id: "gemma2:9b"
    family: gemma
    params_b: 9
    medical_tuned: false
    notes: General model (Google). Largest in the local lineup.

  medgemma-4b:
    provider: ollama
    ollama_model_id: "alibayram/medgemma:4b"
    family: gemma
    params_b: 4
    medical_tuned: true
    notes: >
      MedGemma 4B (Google, Gemma 3 base), instruction-tuned for medical
      text. The medical-tuned model in the lineup.

excluded_models:
  - name: medllama2
    reason: >
      Fine-tuned on MedQA, which is one of our strata. Test-set leakage
      would inflate common-stratum performance. Excluded.
  - name: natlas
    reason: >
      Nigerian federal government LLM. Out of scope for this paper's
      international benchmark framing; candidate for future work on
      African-context clinical LLMs.
